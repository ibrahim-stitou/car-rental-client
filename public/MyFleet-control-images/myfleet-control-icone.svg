<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#142850"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- subtle ping ring -->
  <circle cx="160" cy="50" r="19" fill="none" stroke="#FB8B24" stroke-width="2" opacity="0.3"/>

  <!-- ribbon M: route / growth line -->
